<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FORGE">
    <meta name="theme-color" content="#0A0A0A">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230A0A0A'/%3E%3Cpath d='M30 30h40v8H38v12h28v8H38v22h-8z' fill='%23FF5B2E'/%3E%3C/svg%3E">
    <title>FORGE — Suivi Musculation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F4F2EE;
            --surface: rgba(255, 255, 255, 0.9);
            --ink: #0A0A0A;
            --ink-2: #2A2A2A;
            --muted: #8E8E93;
            --line: #E8E4DC;
            --accent: #FF5B2E;
            --accent-soft: #FFE9DF;
            --positive: #10B981;
            --shadow-sm: inset 0 1px 0 rgba(255, 255, 255, 0.85), inset 0 -1px 0 rgba(255, 255, 255, 0.35), 0 1px 2px rgba(10, 10, 10, 0.03), 0 8px 28px rgba(10, 10, 10, 0.05);
            --shadow-md: 0 8px 32px rgba(10,10,10,.08);
            --radius: 22px;
            --radius-sm: 14px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        html, body {
            margin: 0; padding: 0;
            color: var(--ink);
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
            overflow-x: hidden;
        }
        html { background: linear-gradient(135deg, #F6F2EC 0%, #EAE3D8 45%, #EFE9DF 100%); }
        body { position: relative; background: transparent; min-height: 100vh; min-height: 100dvh; padding-bottom: calc(96px + var(--safe-bottom)); padding-top: var(--safe-top); }
        
        /* Fond animé */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background: radial-gradient(ellipse 60% 50% at 12% 18%, rgba(255, 218, 198, 0.60), transparent 60%), radial-gradient(ellipse 55% 45% at 88% 14%, rgba(212, 226, 250, 0.55), transparent 60%);
        }
        body::after {
            content: ''; position: fixed; inset: -20%; z-index: -1; pointer-events: none; filter: blur(55px);
            background: radial-gradient(circle at 30% 30%, rgba(255, 192, 170, 0.50), transparent 35%), radial-gradient(circle at 72% 68%, rgba(170, 198, 240, 0.45), transparent 35%);
            animation: liquidShimmer 22s ease-in-out infinite alternate;
        }
        @keyframes liquidShimmer {
            0%   { transform: rotate(0deg) translate(0%, 0%) scale(1); }
            100% { transform: rotate(360deg) translate(2%, -2%) scale(0.95); }
        }

        h1, h2, h3, .display { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; letter-spacing: -0.02em; margin: 0; }
        button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
        input { font-family: inherit; font-size: 16px; border: none; outline: none; background: transparent; color: var(--ink); }

        /* HEADER */
        .topbar { padding: 18px 22px 8px; display: flex; align-items: center; justify-content: space-between; }
        .topbar .brand { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.04em; }
        .topbar .brand span { color: var(--accent); }
        .topbar .date { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

        /* SCREENS */
        .screen { display: none; padding: 0 18px; animation: fadeIn .35s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

        /* HOME HERO */
        .hero { background: rgba(10, 10, 10, 0.75); color: #fff; border-radius: 28px; padding: 26px 24px 28px; position: relative; overflow: hidden; box-shadow: var(--shadow-md); }
        .hero .greet { font-size: 13px; color: rgba(255,255,255,.6); text-transform: uppercase; margin-bottom: 6px; }
        .hero .name { font-size: 28px; font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; }
        
        .progress-bar { height: 6px; background: rgba(255,255,255,.12); border-radius: 99px; overflow: hidden; margin: 10px 0; }
        .progress-bar .fill { height: 100%; background: var(--accent); width: 0%; transition: width .8s ease; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 14px; }
        .stat-card { background: var(--surface); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-sm); }
        .stat-card .value { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; font-size: 28px; }
        .stat-card.dark { background: rgba(10, 10, 10, 0.75); color: #fff; }

        /* NAV */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,.85); backdrop-filter: blur(20px); border-top: 1px solid var(--line); padding: 10px 8px calc(10px + var(--safe-bottom)); display: grid; grid-template-columns: repeat(5, 1fr); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); text-decoration: none; }
        .nav-item.active { color: var(--ink); }
        .nav-icon { width: 36px; height: 36px; border-radius: 12px; display: grid; place-items: center; }
        .nav-item.active .nav-icon { background: var(--accent); color: #fff; }
        .nav-label { font-size: 10px; font-weight: 600; }

        /* BOUTONS & CARTES */
        .btn-primary { background: var(--accent); color: #fff; padding: 14px 22px; border-radius: 99px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .workout-card { background: var(--surface); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
        
        /* SHEETS (MODALS) */
        .sheet-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); opacity: 0; pointer-events: none; transition: 0.3s; z-index: 200; }
        .sheet-backdrop.open { opacity: 1; pointer-events: auto; }
        .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; transform: translateY(100%); transition: 0.3s; z-index: 201; padding: 20px; }
        .sheet.open { transform: translateY(0); }
    </style>
</head>
<body>

<div class="topbar">
    <div class="brand">FORGE<span>.</span></div>
    <div id="topDate" class="date"></div>
</div>

<!-- ACCUEIL -->
<section class="screen active" id="screen-home">
    <div class="hero">
        <div class="greet">Salut</div>
        <div class="name" id="homeName">Athlète</div>
        <div class="progress-bar"><div class="fill" id="homeProgress"></div></div>
        <div id="homeGoalText" style="font-size: 12px; opacity: 0.8;">Objectif: -- kg</div>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><div class="label">Séances</div><div class="value" id="homeWorkouts">0</div></div>
        <div class="stat-card dark"><div class="label">Poids</div><div class="value" id="homeWeight">--</div></div>
    </div>
</section>

<!-- SEANCES -->
<section class="screen" id="screen-workouts">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 class="display">Séances</h2>
        <button class="btn-primary" onclick="openSheet('workoutSheet')">+ Nouvelle</button>
    </div>
    <div id="workoutsList"></div>
</section>

<!-- POIDS -->
<section class="screen" id="screen-weight">
    <h2 class="display">Poids</h2>
    <div class="stat-card" style="margin: 20px 0;">
        <div class="value" id="weightCurrent">-- kg</div>
    </div>
    <button class="btn-primary" style="width:100%; justify-content:center;" onclick="openSheet('weightSheet')">Se peser</button>
</section>

<!-- PROFIL -->
<section class="screen" id="screen-profile">
    <h2 class="display">Profil</h2>
    <div class="stat-card" style="margin-top:20px;">
        <input type="text" id="pName" placeholder="Ton prénom" onchange="saveProfile()" style="width:100%; border-bottom:1px solid #eee; padding:10px 0;">
        <input type="number" id="pWeight" placeholder="Poids actuel" onchange="saveProfile()" style="width:100%; padding:10px 0;">
    </div>
</section>

<!-- NAVIGATION -->
<nav class="nav">
    <a href="#" class="nav-item active" onclick="showScreen('home')">
        <div class="nav-icon">🏠</div><div class="nav-label">Accueil</div>
    </a>
    <a href="#" class="nav-item" onclick="showScreen('workouts')">
        <div class="nav-icon">🏋️</div><div class="nav-label">Séances</div>
    </a>
    <a href="#" class="nav-item" onclick="showScreen('weight')">
        <div class="nav-icon">⚖️</div><div class="nav-label">Poids</div>
    </a>
    <a href="#" class="nav-item" onclick="showScreen('profile')">
        <div class="nav-icon">👤</div><div class="nav-label">Profil</div>
    </a>
</nav>

<!-- MODALS -->
<div class="sheet-backdrop" id="backdrop" onclick="closeAllSheets()"></div>
<div class="sheet" id="weightSheet">
    <h3>Nouvelle pesée</h3>
    <input type="number" id="newWeightVal" placeholder="75.0" style="width:100%; font-size:24px; padding:10px; border-bottom:2px solid var(--accent); margin: 20px 0;">
    <button class="btn-primary" style="width:100%; justify-content:center;" onclick="saveWeight()">Enregistrer</button>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('forge_data')) || {
        profile: { name: 'Athlète', weight: 0 },
        workouts: [],
        weights: []
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        event.currentTarget.classList.add('active');
        updateUI();
    }

    function openSheet(id) {
        document.getElementById('backdrop').classList.add('open');
        document.getElementById(id).classList.add('open');
    }

    function closeAllSheets() {
        document.getElementById('backdrop').classList.remove('open');
        document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
    }

    function saveWeight() {
        const val = document.getElementById('newWeightVal').value;
        if(val) {
            data.weights.push({date: new Date(), value: val});
            data.profile.weight = val;
            saveAndRefresh();
        }
    }

    function saveProfile() {
        data.profile.name = document.getElementById('pName').value;
        data.profile.weight = document.getElementById('pWeight').value;
        saveAndRefresh();
    }

    function saveAndRefresh() {
        localStorage.setItem('forge_data', JSON.stringify(data));
        updateUI();
        closeAllSheets();
    }

    function updateUI() {
        document.getElementById('homeName').textContent = data.profile.name || 'Athlète';
        document.getElementById('homeWeight').textContent = (data.profile.weight || '--') + ' kg';
        document.getElementById('weightCurrent').textContent = (data.profile.weight || '--') + ' kg';
        document.getElementById('homeWorkouts').textContent = data.workouts.length;
    }

    document.getElementById('topDate').textContent = new Date().toLocaleDateString('fr-FR', {weekday: 'short', day: 'numeric', month: 'short'}).toUpperCase();
    updateUI();
</script>

</body>
</html>
